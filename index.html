<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYMEN FF</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
direction:rtl;
}

header{
background:#7b1fa2;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
margin:0;
}

.points{
background:orange;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
}

.menu{
font-size:26px;
cursor:pointer;
}

.section-title{
background:#8e24aa;
color:white;
padding:12px;
margin:15px;
border-radius:8px;
text-align:center;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#8e24aa;
color:white;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:6px;
border:1px solid #ccc;
}

.admin-panel{
display:none;
position:fixed;
top:0;
right:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.panel-content{
background:#fff;
width:90%;
max-width:400px;
margin:50px auto;
padding:20px;
border-radius:10px;
max-height:80%;
overflow:auto;
}

.order-box{
background:#f2f2f2;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

</style>
</head>

<body>

<header>
<div class="points">النقاط: <span id="points">50</span></div>
<h2>AYMEN FF ⚡</h2>
<div class="menu" onclick="openPanel()">☰</div>
</header>

<div class="section-title">🔥 شحن فوري وآمن - أفضل الأسعار</div>

<div class="section-title">🎁 إدخال كود</div>
<div style="text-align:center;">
<input type="text" id="codeInput" placeholder="ادخل الكود هنا">
<br>
<button onclick="redeemCode()">تفعيل</button>
</div>

<div class="section-title">💎 عروض الشحن</div>

<div class="card">
<span>110 جوهرة - 150 نقطة</span>
<button onclick="buy(150)">شراء</button>
</div>

<div class="card">
<span>341 جوهرة - 400 نقطة</span>
<button onclick="buy(400)">شراء</button>
</div>

<div class="card">
<span>583 جوهرة - 650 نقطة</span>
<button onclick="buy(650)">شراء</button>
</div>

<div class="card">
<span>1180 جوهرة - 1300 نقطة</span>
<button onclick="buy(1300)">شراء</button>
</div>

<div class="card">
<span>2420 جوهرة - 2500 نقطة</span>
<button onclick="buy(2500)">شراء</button>
</div>

<div class="card">
<span>العضوية الأسبوعية - 200 نقطة</span>
<button onclick="buy(200)">شراء</button>
</div>

<div class="card">
<span>العضوية الشهرية - 500 نقطة</span>
<button onclick="buy(500)">شراء</button>
</div>

<!-- لوحة التحكم -->
<div class="admin-panel" id="adminPanel">
<div class="panel-content">

<h3>لوحة النقط 🔐</h3>

<input type="password" id="adminPass" placeholder="ادخل كلمة السر">
<button onclick="checkLogin()">دخول</button>

<div id="adminContent" style="display:none;">

<h4>👤 عدد المستخدمين: <span id="usersCount">0</span></h4>

<h4>📦 الطلبات:</h4>
<div id="ordersList"></div>

</div>

</div>
</div>

<script>

let points = 50;
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let users = localStorage.getItem("users") || 0;

document.getElementById("usersCount").innerText = users;

function updatePoints(){
document.getElementById("points").innerText = points;
}

function redeemCode(){
let code = document.getElementById("codeInput").value;

if(code === "A16A"){
points += 100;
alert("✅ تم إضافة 100 نقطة");
}
else if(code === "A11A"){
if(localStorage.getItem("usedA11A")){
alert("❌ هذا الكود استُعمل من قبل");
return;
}
points += 100;
localStorage.setItem("usedA11A", true);
alert("✅ تم إضافة 100 نقطة (مرة واحدة)");
}
else{
alert("❌ كود غير صحيح");
}

updatePoints();
}

function buy(cost){

if(points < cost){
alert("❌ ليس لديك نقاط كافية");
return;
}

let id = prompt("ادخل ID اللعبة:");

if(!id){
alert("❌ يجب إدخال ID");
return;
}

points -= cost;
updatePoints();

let offerName = "";

if(cost == 150) offerName = "110 جوهرة";
if(cost == 400) offerName = "341 جوهرة";
if(cost == 650) offerName = "583 جوهرة";
if(cost == 1300) offerName = "1180 جوهرة";
if(cost == 2500) offerName = "2420 جوهرة";
if(cost == 200) offerName = "عضوية أسبوعية";
if(cost == 500) offerName = "عضوية شهرية";

let order = {
playerID: id,
offer: offerName,
price: cost,
date: new Date().toLocaleString()
};

orders.push(order);
localStorage.setItem("orders", JSON.stringify(orders));

alert("✅ تم إرسال طلب الشحن بنجاح");
}

function openPanel(){
document.getElementById("adminPanel").style.display = "block";
}

function checkLogin(){
let pass = document.getElementById("adminPass").value;

if(pass === "1"){
document.getElementById("adminContent").style.display = "block";

let list = document.getElementById("ordersList");
list.innerHTML = "";

if(orders.length === 0){
list.innerHTML = "لا توجد طلبات بعد";
}else{
orders.forEach(function(order){
list.innerHTML += `
<div class="order-box">
👤 ID: ${order.playerID}<br>
🎁 العرض: ${order.offer}<br>
💰 السعر: ${order.price} نقطة<br>
🕒 ${order.date}
</div>
`;
});
}
}
else{
alert("❌ كلمة السر خاطئة");
}
}

</script>

</body>
</html>
